<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RH FACTORY — Ultimate AI Rendering Orchestrator</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/interactjs/dist/interact.min.js"></script>
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>
  :root {
    --bg: #F5F3EF; --panel: #FFFFFF; --border: #E0DCD3; 
    --text-main: #2C2825; --text-muted: #8A857D;
    --accent: #B8922F; --accent-light: #FDFBF7; --espresso: #3D2E28;
    --radius: 8px; --radius-lg: 16px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text-main); min-height: 100vh; overflow-x: hidden; }
  
  /* ── NAV ── */
  nav { height: 60px; background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 32px; position: sticky; top: 0; z-index: 1000; }
  .nbrand { font-family: 'Cormorant Garamond', serif; font-size: 20px; font-weight: 600; letter-spacing: 0.15em; }
  .ntag { font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--text-muted); margin-left: 16px; border-left: 1px solid var(--border); padding-left: 16px; }

  /* ── LAYOUT ── */
  .app-container { display: grid; grid-template-columns: 420px 1fr; gap: 24px; padding: 24px 32px; max-width: 1600px; margin: 0 auto; align-items: start; }
  
  /* ── LEFT PANEL (Controls) ── */
  .control-panel { background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 24px; display: flex; flex-direction: column; gap: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.02); }
  
  .section-title { font-size: 11px; font-weight: 600; letter-spacing: 0.15em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
  .section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  /* Upload Zone */
  .upload-zone { border: 1px dashed #C4BAB0; border-radius: var(--radius); padding: 32px 20px; text-align: center; cursor: pointer; transition: all 0.2s; background: var(--accent-light); }
  .upload-zone:hover { border-color: var(--accent); background: rgba(184,146,47,0.05); }
  .upload-zone p { font-size: 12px; color: var(--text-muted); margin-top: 8px; }

  /* Product List */
  .product-list { display: flex; flex-direction: column; gap: 8px; max-height: 240px; overflow-y: auto; padding-right: 4px; }
  .product-item { display: flex; align-items: center; gap: 12px; padding: 8px; border: 1px solid var(--border); border-radius: var(--radius); background: #FAFAFA; }
  .product-item img { width: 40px; height: 40px; object-fit: contain; background: white; border-radius: 4px; border: 1px solid #EEE; }
  .product-inputs { display: flex; flex-direction: column; gap: 4px; flex: 1; }
  .product-inputs input { border: none; background: transparent; font-size: 12px; color: var(--text-main); outline: none; width: 100%; font-family: 'DM Sans', sans-serif; }
  .product-inputs input.type { font-size: 10px; color: var(--text-muted); }
  .product-inputs input:focus { background: white; box-shadow: 0 0 0 1px var(--border); border-radius: 2px; }
  .del-btn { background: none; border: none; color: #ff4d4f; cursor: pointer; font-size: 16px; padding: 0 8px; opacity: 0.5; transition: opacity 0.2s; }
  .product-item:hover .del-btn { opacity: 1; }

  /* Settings */
  .form-group { display: flex; flex-direction: column; gap: 6px; }
  .form-group label { font-size: 11px; font-weight: 500; color: var(--espresso); }
  .form-group select, .form-group input { padding: 10px 12px; border: 1px solid var(--border); border-radius: var(--radius); font-size: 13px; font-family: 'DM Sans', sans-serif; outline: none; }
  .form-group select:focus, .form-group input:focus { border-color: var(--accent); }

  /* Magic Button */
  .magic-btn { background: var(--espresso); color: white; border: none; padding: 16px; border-radius: var(--radius); font-size: 14px; font-weight: 500; letter-spacing: 0.05em; cursor: pointer; transition: all 0.2s; display: flex; justify-content: center; align-items: center; gap: 8px; box-shadow: 0 8px 20px rgba(61,46,40,0.2); margin-top: 12px; }
  .magic-btn:hover { background: #1A1410; transform: translateY(-2px); box-shadow: 0 12px 24px rgba(61,46,40,0.3); }

  /* ── RIGHT PANEL (Canvas) ── */
  .canvas-container { display: flex; flex-direction: column; align-items: center; gap: 20px; }
  .canvas-wrapper { position: relative; width: 540px; height: 720px; background: white; box-shadow: 0 20px 60px rgba(0,0,0,0.08); overflow: hidden; border: 1px solid var(--border); }
  
  /* Canvas Background */
  .canvas-bg { position: absolute; inset: 0; background: linear-gradient(160deg, #F8F6F0 0%, #EAE5D9 100%); z-index: 1; }
  .canvas-grid { position: absolute; inset: 0; background-image: linear-gradient(rgba(0,0,0,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0,0,0,0.03) 1px, transparent 1px); background-size: 60px 60px; z-index: 2; pointer-events: none; }
  
  /* Draggable Items */
  .canvas-item { position: absolute; z-index: 10; display: flex; align-items: center; justify-content: center; touch-action: none; user-select: none; }
  .canvas-item img { width: 100%; height: 100%; object-fit: contain; pointer-events: none; filter: drop-shadow(0 12px 24px rgba(0,0,0,0.15)); }
  .canvas-item.active { outline: 2px dashed var(--accent); outline-offset: 4px; }
  .resize-handle { position: absolute; right: -8px; bottom: -8px; width: 16px; height: 16px; background: var(--accent); border: 2px solid white; border-radius: 50%; cursor: nwse-resize; display: none; z-index: 20; box-shadow: 0 2px 6px rgba(0,0,0,0.2); }
  .canvas-item.active .resize-handle { display: block; }

  /* ── PROMPT MODAL ── */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); z-index: 2000; display: none; justify-content: center; align-items: center; padding: 40px; }
  .modal-overlay.active { display: flex; }
  .modal-content { background: white; width: 100%; max-width: 800px; max-height: 90vh; border-radius: var(--radius-lg); display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 24px 80px rgba(0,0,0,0.2); }
  .modal-header { padding: 20px 24px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: var(--accent-light); }
  .modal-header h2 { font-family: 'Cormorant Garamond', serif; font-size: 22px; color: var(--espresso); }
  .close-btn { background: none; border: none; font-size: 24px; cursor: pointer; color: var(--text-muted); }
  .modal-body { padding: 24px; overflow-y: auto; flex: 1; }
  .prompt-box { background: #FAFAFA; border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; font-family: monospace; font-size: 12px; line-height: 1.6; color: #333; white-space: pre-wrap; user-select: all; }
  .modal-footer { padding: 16px 24px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 12px; background: white; }
  .btn-secondary { padding: 10px 20px; background: white; border: 1px solid var(--border); border-radius: var(--radius); cursor: pointer; font-size: 13px; }
  .btn-primary { padding: 10px 24px; background: var(--accent); color: white; border: none; border-radius: var(--radius); cursor: pointer; font-size: 13px; font-weight: 500; }

  /* Hidden Canvas for SpriteSheet */
  #spriteCanvas { display: none; }
</style>
</head>
<body>

<nav>
  <span class="nbrand">RH FACTORY</span>
  <span class="ntag">Agentic Rendering Orchestrator</span>
</nav>

<div class="app-container">
  <div class="control-panel">
    
    <div>
      <div class="section-title">1. 资产载入 (Assets)</div>
      <div class="upload-zone" onclick="document.getElementById('fileInput').click()">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin: 0 auto; color: var(--accent);"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg>
        <p>点击或拖拽上传去背家具图</p>
      </div>
      <input type="file" id="fileInput" accept="image/*" multiple style="display:none" onchange="handleUpload(event)">
      
      <div class="product-list" id="productList" style="margin-top: 12px;"></div>
    </div>

    <div>
      <div class="section-title">2. 场景约束 (Environment Constraints)</div>
      <div class="form-group" style="margin-bottom: 12px;">
        <label>空间风格 (Style)</label>
        <select id="envStyle">
          <option value="Modern French / Parisian, bright airy, elegant, cream and white tones">法式清新 (Modern French)</option>
          <option value="Italian Elegance, travertine, warm amber lighting, luxury">意式优雅 (Italian Elegance)</option>
          <option value="Japandi Wabi-sabi, rough plaster, raw linen, minimal">奶油侘寂 (Japandi Wabi-sabi)</option>
          <option value="Dark Moody Luxury, charcoal walls, dramatic spotlights">高级暗黑 (Dark Moody Luxury)</option>
        </select>
      </div>
      <div class="form-group">
        <label>空间类型 (Room Type)</label>
        <select id="envRoom">
          <option value="Living Room">客厅 (Living Room)</option>
          <option value="Bedroom">卧室 (Bedroom)</option>
          <option value="Dining Room">餐厅 (Dining Room)</option>
        </select>
      </div>
    </div>

    <button class="magic-btn" onclick="orchestrateGeneration()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/></svg>
      生成 AI 渲染封包 (双图+提示词)
    </button>
    <p style="font-size: 11px; color: var(--text-muted); text-align: center; line-height: 1.5;">点击后将自动下载「2D排版参考图」与「资产编号图」，<br>并生成用于 Gemini 的空间拓扑提示词。</p>
  </div>

  <div class="canvas-container">
    <div style="width: 100%; display: flex; justify-content: space-between; align-items: flex-end; width: 540px;">
      <div>
        <h3 style="font-family: 'Cormorant Garamond'; font-size: 24px;">Spatial Sandbox</h3>
        <p style="font-size: 12px; color: var(--text-muted);">拖拽调整位置，拉动右下角缩放。点击元素可将其置顶。</p>
      </div>
      <span style="font-size: 10px; padding: 4px 8px; background: #EAE5D9; border-radius: 4px; color: var(--espresso);">540 × 720</span>
    </div>

    <div class="canvas-wrapper" id="renderCanvas">
      <div class="canvas-bg"></div>
      <div class="canvas-grid"></div>
      </div>
  </div>
</div>

<canvas id="spriteCanvas"></canvas>

<div class="modal-overlay" id="promptModal">
  <div class="modal-content">
    <div class="modal-header">
      <h2>Gemini 终极渲染指令</h2>
      <button class="close-btn" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body">
      <p style="font-size: 13px; color: var(--espresso); margin-bottom: 12px;">
        <strong>✅ 封包已生成！</strong> 两张参考图已自动下载。请将下载的 <b>2 张图片</b> 拖入 Gemini，并复制以下提示词发送：
      </p>
      <div class="prompt-box" id="finalPromptText"></div>
    </div>
    <div class="modal-footer">
      <button class="btn-secondary" onclick="closeModal()">关闭</button>
      <button class="btn-primary" id="copyBtn" onclick="copyPrompt()">复制提示词</button>
    </div>
  </div>
</div>

<script>
  let prods = [];
  let zIndexCounter = 100;
  const CANVAS_W = 540;
  const CANVAS_H = 720;

  // ── 1. ASSET MANAGEMENT ──
  function handleUpload(e) {
    Array.from(e.target.files).forEach((file, i) => {
      const reader = new FileReader();
      reader.onload = ev => {
        const id = 'item_' + Date.now() + i;
        const p = {
          id: id,
          name: file.name.replace(/\.[^.]+$/, ''),
          type: '单品/Item',
          src: ev.target.result,
          x: 100 + (prods.length * 30 % 200),
          y: 200 + (prods.length * 40 % 300),
          w: 180, // Default width
          z: zIndexCounter++
        };
        prods.push(p);
        renderProductList();
        addCanvasItem(p);
      };
      reader.readAsDataURL(file);
    });
    e.target.value = '';
  }

  function renderProductList() {
    const list = document.getElementById('productList');
    list.innerHTML = '';
    prods.forEach(p => {
      list.innerHTML += `
        <div class="product-item" id="list_${p.id}">
          <img src="${p.src}">
          <div class="product-inputs">
            <input type="text" value="${p.name}" onchange="updateProd('${p.id}', 'name', this.value)" placeholder="名称">
            <input type="text" class="type" value="${p.type}" onchange="updateProd('${p.id}', 'type', this.value)" placeholder="如: Sofa, Lamp, Rug">
          </div>
          <button class="del-btn" onclick="removeProd('${p.id}')">×</button>
        </div>
      `;
    });
  }

  function updateProd(id, key, val) {
    const p = prods.find(x => x.id === id);
    if(p) p[key] = val;
  }

  function removeProd(id) {
    prods = prods.filter(x => x.id !== id);
    renderProductList();
    const el = document.getElementById(id);
    if(el) el.remove();
  }

  // ── 2. INTERACTIVE CANVAS (Interact.js) ──
  function addCanvasItem(p) {
    const wrapper = document.getElementById('renderCanvas');
    const el = document.createElement('div');
    el.className = 'canvas-item';
    el.id = p.id;
    el.style.width = p.w + 'px';
    el.style.zIndex = p.z;
    el.style.transform = `translate(${p.x}px, ${p.y}px)`;
    el.setAttribute('data-x', p.x);
    el.setAttribute('data-y', p.y);
    
    el.innerHTML = `
      <img src="${p.src}">
      <div class="resize-handle"></div>
    `;
    wrapper.appendChild(el);
  }

  // Init drag and resize
  interact('.canvas-item')
    .draggable({
      modifiers: [ interact.modifiers.restrictRect({ restriction: 'parent', endOnly: true }) ],
      listeners: {
        start(event) {
          document.querySelectorAll('.canvas-item').forEach(el => el.classList.remove('active'));
          event.target.classList.add('active');
          event.target.style.zIndex = zIndexCounter++; // Bring to front
        },
        move(event) {
          const target = event.target;
          const x = (parseFloat(target.getAttribute('data-x')) || 0) + event.dx;
          const y = (parseFloat(target.getAttribute('data-y')) || 0) + event.dy;
          target.style.transform = `translate(${x}px, ${y}px)`;
          target.setAttribute('data-x', x);
          target.setAttribute('data-y', y);
        }
      }
    })
    .resizable({
      edges: { right: '.resize-handle', bottom: '.resize-handle' },
      modifiers: [
        interact.modifiers.aspectRatio({ ratio: 'preserve' }) // Keep aspect ratio
      ],
      listeners: {
        move: function (event) {
          let target = event.target;
          target.style.width = event.rect.width + 'px';
        }
      }
    });

  // Click outside to deselect
  document.addEventListener('pointerdown', (e) => {
    if (!e.target.closest('.canvas-item') && !e.target.closest('.control-panel')) {
      document.querySelectorAll('.canvas-item').forEach(el => el.classList.remove('active'));
    }
  });

  // ── 3. ORCHESTRATION: The Magic Happens Here ──
  async function orchestrateGeneration() {
    if(prods.length === 0) { alert('请先上传至少一件家具！'); return; }
    
    // Deselect all
    document.querySelectorAll('.canvas-item').forEach(el => el.classList.remove('active'));

    // Step A: Snapshot 2D Canvas (Reference_Layout)
    const canvasEl = document.getElementById('renderCanvas');
    const layoutCanvas = await html2canvas(canvasEl, { scale: 1.5, useCORS: true });
    downloadCanvas(layoutCanvas, '1_Layout_Reference.png');

    // Step B: Generate Sprite Sheet (Assets)
    await generateSpriteSheet();

    // Step C: Generate Topological Prompt
    const prompt = buildTopologicalPrompt();
    document.getElementById('finalPromptText').textContent = prompt;
    document.getElementById('promptModal').classList.add('active');
  }

  // ── A. Download Helper ──
  function downloadCanvas(canvas, filename) {
    const link = document.createElement('a');
    link.download = filename;
    link.href = canvas.toDataURL('image/png');
    link.click();
  }

  // ── B. Sprite Sheet Generator ──
  async function generateSpriteSheet() {
    const cols = Math.ceil(Math.sqrt(prods.length));
    const rows = Math.ceil(prods.length / cols);
    const cellS = 400; // Size of each cell
    const gap = 20;
    
    const cvs = document.getElementById('spriteCanvas');
    cvs.width = cols * cellS + (cols + 1) * gap;
    cvs.height = rows * cellS + (rows + 1) * gap + (rows * 60); // Extra height for text
    const ctx = cvs.getContext('2d');

    ctx.fillStyle = '#FFFFFF';
    ctx.fillRect(0, 0, cvs.width, cvs.height);

    for(let i = 0; i < prods.length; i++) {
      const p = prods[i];
      const col = i % cols;
      const row = Math.floor(i / cols);
      const x = gap + col * (cellS + gap);
      const y = gap + row * (cellS + 60 + gap);

      // Draw bounding box
      ctx.strokeStyle = '#EEEEEE';
      ctx.lineWidth = 2;
      ctx.strokeRect(x, y, cellS, cellS);

      // Draw Image
      const img = new Image();
      img.src = p.src;
      await new Promise(r => { img.onload = r; });
      
      const scale = Math.min((cellS - 40) / img.width, (cellS - 40) / img.height);
      const dw = img.width * scale;
      const dh = img.height * scale;
      const dx = x + (cellS - dw) / 2;
      const dy = y + (cellS - dh) / 2;
      ctx.drawImage(img, dx, dy, dw, dh);

      // Draw ID Circle
      ctx.fillStyle = '#3D2E28';
      ctx.beginPath(); ctx.arc(x + 30, y + 30, 20, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#FFFFFF';
      ctx.font = 'bold 20px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(i + 1, x + 30, y + 30);

      // Draw Name & Type
      ctx.fillStyle = '#2C2825';
      ctx.font = 'bold 18px sans-serif';
      ctx.fillText(`[${i+1}] ${p.name}`, x + cellS/2, y + cellS + 25);
      ctx.fillStyle = '#8A857D';
      ctx.font = '14px sans-serif';
      ctx.fillText(p.type, x + cellS/2, y + cellS + 50);
    }

    downloadCanvas(cvs, '2_Asset_SpriteSheet.png');
  }

  // ── C. Topological Prompt Generator ──
  function buildTopologicalPrompt() {
    const style = document.getElementById('envStyle').value;
    const room = document.getElementById('envRoom').value;

    // 1. Map current positions on Canvas
    // Sort items by Z-index to know back-to-front layers
    const sortedProds = [...prods].sort((a, b) => {
      const elA = document.getElementById(a.id);
      const elB = document.getElementById(b.id);
      return parseInt(elA.style.zIndex) - parseInt(elB.style.zIndex);
    });

    let spatialRules = "";
    sortedProds.forEach((p, index) => {
      const el = document.getElementById(p.id);
      const x = parseFloat(el.getAttribute('data-x'));
      const y = parseFloat(el.getAttribute('data-y'));
      const w = parseFloat(el.style.width);
      const h = el.offsetHeight;
      
      // Calculate Center Point relative to Canvas (540x720)
      const cx = x + (w / 2);
      const cy = y + (h / 2);

      // Horizontal mapping
      let hPos = "Center";
      if(cx < CANVAS_W * 0.33) hPos = "Left side";
      else if(cx > CANVAS_W * 0.66) hPos = "Right side";

      // Vertical / Depth mapping (in interior, higher Y = closer to camera/foreground)
      let vPos = "Midground";
      if(cy < CANVAS_H * 0.4) vPos = "Background (further away)";
      else if(cy > CANVAS_H * 0.7) vPos = "Foreground (closest to camera)";

      // Find original index for SpriteSheet referencing
      const originalIdx = prods.findIndex(orig => orig.id === p.id) + 1;

      // Layering text based on sorted array (later in array = front)
      let layerText = index === 0 ? "Base layer (farthest back)" : 
                      index === sortedProds.length - 1 ? "Top layer (frontmost)" : 
                      "Middle layer";

      spatialRules += `- [Asset ${originalIdx}] ${p.name} (${p.type}): Placed in the **${hPos}, ${vPos}**. (${layerText})\n`;
    });

    // 2. Build the massive Prompt
    return `I am providing TWO reference images to generate a highly realistic, photorealistic 3D interior render.

IMAGE 1 [1_Layout_Reference.png]: The 2D structural composition. You MUST use this as a STRICT spatial blueprint.
IMAGE 2 [2_Asset_SpriteSheet.png]: The visual assets. Contains numbered products. You MUST use the exact design, color, and material of these products. DO NOT invent new furniture.

================================================================
ENVIRONMENT & MOOD
================================================================
- Room Type: ${room}
- Interior Style & Lighting: ${style}
- Camera: Eye-level perspective, interior architectural photography, 85mm lens, photorealistic lighting with global illumination and soft ambient occlusion.

================================================================
STRICT SPATIAL TOPOLOGY (Do not deviate from this layout)
================================================================
Based on the provided 2D blueprint, place the assets in 3D space exactly as described below:

${spatialRules}

================================================================
PHYSICS & LOGIC CONSTRAINTS (Crucial for realism)
================================================================
- ALL rugs/carpets must lie completely flat on the floor. NEVER on walls or floating.
- ALL ceiling lights/chandeliers must hang from the ceiling down.
- ALL floor lamps, sofas, and tables must sit firmly on the floor/rug.
- Adjust the scale of the items to be realistic relative to a human scale in a ${room}.
- Maintain the exact colors and materials shown in the Asset Sheet.

GENERATE THE PHOTOREALISTIC 3D RENDER NOW.`;
  }

  // ── Modal Handlers ──
  function closeModal() {
    document.getElementById('promptModal').classList.remove('active');
  }

  function copyPrompt() {
    const text = document.getElementById('finalPromptText').textContent;
    navigator.clipboard.writeText(text).then(() => {
      const btn = document.getElementById('copyBtn');
      btn.textContent = '已复制 ✓';
      btn.style.background = '#2d6a4f';
      setTimeout(() => { 
        btn.textContent = '复制提示词'; 
        btn.style.background = 'var(--accent)'; 
      }, 2000);
    });
  }
</script>
</body>
</html>
